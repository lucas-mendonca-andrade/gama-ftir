name: Publish

on:
  push:
  release:
    types:
      - published

  workflow_dispatch:
    inputs:
      year:
        required: true
        type: number
      macro:
        required: true
        type: number
      micro:
        required: true
        type: number
      suffix:
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install build & publish dependencies
        run: |
          python -m pip install twine build

      - name: Build Wheel
        run: |
          python -m build

      - name: Upload Dist
        uses: actions/upload-artifact@v3
        with:
          name: dist-folder
          path: dist
          retention-days: 1

  test-install:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Download dist
        uses: actions/download-artifact@v3
        with:
          name: dist-folder

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Wheel
        shell: bash
        run: |
          ls -lah
          ls -lah dist
          python -m pip install dist/*.whl

      - name: Run example
        run: |
          # First reduce runtime for 3 minutes to 1 minute
          sed -i '' "s/180/60/" examples/classification_example.py
          sed -i '' "s/3/1/" examples/classification_example.py
          python examples/classification_example.py

  publish:
    needs: test-install
    runs-on: ubuntu-latest
    steps:
      - name: Download dist
        uses: actions/download-artifact@v3
        with:
          name: dist-folder

      - name: Upload to test server
        run: |
          python -m twine upload --repository testpypi -u __token__ -p ${{ secrets.TEST_PYPI }} dist/*
